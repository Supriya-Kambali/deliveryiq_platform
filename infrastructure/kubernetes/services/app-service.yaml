# IBM DeliveryIQ — Kubernetes Services
# ======================================
# WHY KUBERNETES SERVICES?
#   Pods in Kubernetes get random IP addresses that change when they restart.
#   A Service provides a STABLE endpoint (fixed IP + DNS name) that always
#   points to the right pods — even as pods come and go.
#
#   Think of it like a phone number:
#   - The person (pod) might move to a new house (IP address)
#   - But their phone number (Service) stays the same
#   - You always call the same number to reach them
#
# SERVICE TYPES:
#   - ClusterIP: Only accessible inside the cluster (internal services)
#   - NodePort: Accessible from outside via node's IP + port (dev/testing)
#   - LoadBalancer: Cloud load balancer (production on IBM Cloud/AWS)

# ─────────────────────────────────────────────────────────────────
# IBM DeliveryIQ App Service
# WHY NODEPORT? For Minikube local testing — accessible from your browser
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ibm-deliveryiq-service
  labels:
    app: ibm-deliveryiq
spec:
  type: NodePort
  selector:
    app: ibm-deliveryiq    # Routes to pods with this label
  ports:
    - name: streamlit
      protocol: TCP
      port: 8501           # Service port (inside cluster)
      targetPort: 8501     # Container port
      nodePort: 30501      # External port (access via minikube IP:30501)

---
# ─────────────────────────────────────────────────────────────────
# ChromaDB Service
# WHY CLUSTERIP? ChromaDB only needs to be accessible inside the cluster
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: chromadb-service
  labels:
    app: chromadb
spec:
  type: ClusterIP    # Internal only — app connects to "chromadb-service:8000"
  selector:
    app: chromadb
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000

---
# ─────────────────────────────────────────────────────────────────
# Ollama Service
# WHY CLUSTERIP? LLM server only needs to be accessible inside cluster
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  labels:
    app: ollama
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
    - name: ollama-api
      protocol: TCP
      port: 11434
      targetPort: 11434

---
# ─────────────────────────────────────────────────────────────────
# ConfigMap — IBM DeliveryIQ Configuration
# WHY CONFIGMAP?
# ConfigMaps store non-sensitive configuration as key-value pairs.
# This separates configuration from code — change config without
# rebuilding the Docker image.
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: ibm-deliveryiq-config
data:
  OLLAMA_MODEL: "llama3"
  EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  CHUNK_SIZE: "500"
  TOP_K_RESULTS: "4"
  APP_NAME: "IBM DeliveryIQ"
  APP_VERSION: "1.0"
  IBM_TEAM: "IBM Global Business Services"

